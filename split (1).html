<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Разделить счёт</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700&family=Inter:wght@400;500;600&display=swap');

  :root {
    --bg: #f5f0e8;
    --card: #fffdf8;
    --border: #e0d8cc;
    --text: #1a1612;
    --muted: #8a7f72;
    --accent: #2d2420;
    --green: #2a7a4b;
    --green-bg: #e8f5ee;
    --green-text: #1a5c38;
    --red: #c0392b;
    --red-bg: #fdecea;
    --shadow: 0 2px 8px rgba(0,0,0,0.06);
    --shadow-lg: 0 8px 32px rgba(0,0,0,0.10);
    --radius: 12px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  .header { background: var(--accent); color: #fff; padding: 20px 24px; position: sticky; top: 0; z-index: 100; }
  .header-title { font-family: 'Unbounded', sans-serif; font-size: 17px; font-weight: 700; letter-spacing: -0.5px; }
  .header-sub { font-size: 11px; opacity: 0.45; margin-top: 2px; }

  .main { max-width: 680px; margin: 0 auto; padding: 20px 16px 120px; }
  .section-label { font-size: 10px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; box-shadow: var(--shadow); margin-bottom: 12px; }

  .people-count-row { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
  .count-btn { width: 34px; height: 34px; border-radius: 50%; border: 1.5px solid var(--border); background: transparent; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text); transition: all 0.15s; font-family: inherit; }
  .count-btn:hover { background: var(--bg); border-color: var(--accent); }
  .count-num { font-family: 'Unbounded', sans-serif; font-size: 26px; font-weight: 700; min-width: 32px; text-align: center; }
  .people-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 8px; }
  .person-input-wrap { display: flex; align-items: center; gap: 6px; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 6px 10px; }
  .person-name-input { border: none; background: transparent; font-family: 'Inter', sans-serif; font-size: 13px; color: var(--text); width: 100%; outline: none; }

  .venue-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); margin-bottom: 16px; overflow: hidden; }
  .venue-header { display: flex; align-items: center; gap: 10px; padding: 13px 16px; background: var(--accent); color: #fff; }
  .venue-name-input { flex: 1; border: none; background: transparent; font-family: 'Unbounded', sans-serif; font-size: 13px; font-weight: 700; color: #fff; outline: none; min-width: 0; }
  .venue-name-input::placeholder { color: rgba(255,255,255,0.35); }
  .venue-delete-btn { background: rgba(255,255,255,0.1); border: none; color: rgba(255,255,255,0.65); cursor: pointer; font-size: 12px; padding: 4px 9px; border-radius: 6px; font-family: inherit; transition: background 0.15s; }
  .venue-delete-btn:hover { background: rgba(255,255,255,0.2); color: #fff; }
  .venue-body { padding: 14px 16px; }

  .mode-toggle { display: flex; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 3px; gap: 3px; margin-bottom: 14px; }
  .mode-btn { flex: 1; padding: 6px 8px; border: none; border-radius: 6px; font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.15s; color: var(--muted); background: transparent; }
  .mode-btn.active { background: var(--accent); color: #fff; }

  .dish-row { display: flex; flex-direction: column; gap: 7px; padding: 9px 0; border-bottom: 1px solid var(--border); }
  .dish-row:last-of-type { border-bottom: none; }
  .dish-main-row { display: flex; align-items: center; gap: 7px; }
  .dish-name-input { flex: 1; min-width: 0; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--bg); font-family: 'Inter', sans-serif; font-size: 13px; color: var(--text); padding: 6px 10px; outline: none; transition: border-color 0.15s; }
  .dish-name-input:focus { border-color: var(--accent); }
  .dish-price-wrap { display: flex; align-items: center; gap: 4px; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 6px 10px; }
  .dish-price-wrap:focus-within { border-color: var(--accent); }
  .dish-price-input { width: 68px; border: none; background: transparent; font-family: 'Inter', sans-serif; font-size: 13px; color: var(--text); outline: none; text-align: right; }
  .currency { font-size: 12px; color: var(--muted); font-weight: 500; }
  .dish-del-btn { width: 29px; height: 29px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: transparent; cursor: pointer; color: var(--muted); font-size: 13px; display: flex; align-items: center; justify-content: center; transition: all 0.15s; flex-shrink: 0; font-family: inherit; }
  .dish-del-btn:hover { background: var(--red-bg); color: var(--red); border-color: #f5bfbc; }
  .chips-row { display: flex; flex-wrap: wrap; gap: 5px; padding-left: 2px; }
  .chip { display: inline-flex; align-items: center; gap: 5px; padding: 4px 10px; border-radius: 20px; border: 1px solid var(--border); background: var(--bg); font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.12s; color: var(--muted); user-select: none; }
  .chip:hover { border-color: var(--accent); color: var(--text); }
  .chip.on { background: var(--accent); border-color: var(--accent); color: #fff; }
  .chip-av { width: 15px; height: 15px; border-radius: 50%; font-size: 8px; font-weight: 700; display: flex; align-items: center; justify-content: center; color: #fff; font-family: 'Unbounded', sans-serif; flex-shrink: 0; }

  .add-dish-btn { width: 100%; margin-top: 10px; padding: 8px; border: 1.5px dashed var(--border); border-radius: var(--radius-sm); background: transparent; font-family: 'Inter', sans-serif; font-size: 12px; color: var(--muted); cursor: pointer; transition: all 0.15s; }
  .add-dish-btn:hover { border-color: var(--accent); color: var(--text); background: var(--bg); }

  /* Payer */
  .payer-section { margin-top: 14px; border-top: 1px solid var(--border); padding-top: 13px; }
  .payer-label { font-size: 10px; font-weight: 600; letter-spacing: 1.2px; text-transform: uppercase; color: var(--muted); margin-bottom: 9px; }
  .payer-mode-toggle { display: flex; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 2px; gap: 2px; margin-bottom: 10px; width: fit-content; }
  .payer-mode-btn { padding: 5px 12px; border: none; border-radius: 5px; font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 500; cursor: pointer; transition: all 0.12s; color: var(--muted); background: transparent; }
  .payer-mode-btn.active { background: var(--accent); color: #fff; }
  .payer-single-row { display: flex; flex-wrap: wrap; gap: 5px; }
  .payer-multi-grid { display: flex; flex-direction: column; gap: 7px; }
  .payer-person-row { display: flex; align-items: center; gap: 8px; }
  .payer-person-name { display: flex; align-items: center; gap: 6px; font-size: 13px; min-width: 120px; }
  .payer-amount-wrap { display: flex; align-items: center; gap: 4px; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 5px 9px; }
  .payer-amount-wrap:focus-within { border-color: var(--green); }
  .payer-amount-input { width: 72px; border: none; background: transparent; font-family: 'Inter', sans-serif; font-size: 13px; color: var(--text); outline: none; text-align: right; }
  .badge { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; border-radius: 20px; padding: 3px 9px; font-weight: 500; margin-top: 8px; }
  .badge-green { background: var(--green-bg); color: var(--green-text); }
  .badge-warn { background: #fff7e6; color: #7a5000; }
  .venue-total-row { display: flex; justify-content: space-between; align-items: center; font-size: 12px; color: var(--muted); margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); }

  .add-venue-btn { width: 100%; padding: 12px; border: 2px dashed var(--border); border-radius: var(--radius); background: transparent; font-family: 'Unbounded', sans-serif; font-size: 12px; font-weight: 700; color: var(--muted); cursor: pointer; transition: all 0.15s; margin-bottom: 24px; }
  .add-venue-btn:hover { border-color: var(--accent); color: var(--text); }

  /* Summary */
  .summary-card { background: var(--accent); color: #fff; border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow-lg); margin-bottom: 12px; }
  .summary-section-title { font-family: 'Unbounded', sans-serif; font-size: 11px; font-weight: 700; opacity: 0.5; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 12px; }
  .people-totals { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 8px; }
  .person-total-card { background: rgba(255,255,255,0.07); border-radius: var(--radius-sm); padding: 10px 12px; }
  .person-total-name { display: flex; align-items: center; gap: 5px; font-size: 11px; opacity: 0.55; margin-bottom: 4px; overflow: hidden; }
  .person-total-consumed { font-family: 'Unbounded', sans-serif; font-size: 16px; font-weight: 700; }
  .person-total-paid { font-size: 11px; opacity: 0.45; margin-top: 2px; }
  .grand-total-row { display: flex; justify-content: space-between; align-items: center; margin-top: 14px; padding-top: 14px; border-top: 1px solid rgba(255,255,255,0.12); }
  .grand-total-label { font-size: 12px; opacity: 0.45; }
  .grand-total-amount { font-family: 'Unbounded', sans-serif; font-size: 20px; font-weight: 700; }

  /* Settlements */
  .settlements-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; margin-bottom: 12px; }
  .settlements-header { background: #1a5c38; color: #fff; padding: 13px 18px; font-family: 'Unbounded', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }
  .settlement-row { border-top: 1px solid var(--border); padding: 13px 18px; display: flex; align-items: center; gap: 8px; }
  .settle-from { display: flex; align-items: center; gap: 6px; font-size: 14px; font-weight: 500; }
  .settle-arrow { color: var(--muted); font-size: 18px; flex-shrink: 0; }
  .settle-to { display: flex; align-items: center; gap: 6px; font-size: 14px; font-weight: 500; flex: 1; }
  .settle-amount { font-family: 'Unbounded', sans-serif; font-size: 15px; font-weight: 700; color: var(--green-text); white-space: nowrap; }

  .ok-banner { background: var(--green-bg); color: var(--green-text); border-radius: var(--radius); padding: 14px 18px; font-size: 13px; font-weight: 500; text-align: center; }
  .empty-hint { text-align: center; padding: 10px 0; font-size: 12px; color: var(--muted); }
</style>
</head>
<body>

<div class="header">
  <div class="header-title">Разделить счёт</div>
  <div class="header-sub">Кто что заказал · Кто заплатил · Кто кому должен</div>
</div>

<div class="main">
  <div style="margin-bottom:20px">
    <div class="section-label">Участники</div>
    <div class="card">
      <div class="people-count-row">
        <button class="count-btn" id="decBtn">−</button>
        <div class="count-num" id="countNum">2</div>
        <button class="count-btn" id="incBtn">+</button>
        <span style="font-size:12px;color:var(--muted);margin-left:4px">человека</span>
      </div>
      <div class="people-grid" id="peopleGrid"></div>
    </div>
  </div>

  <div class="section-label">Места</div>
  <div id="venuesContainer"></div>
  <button class="add-venue-btn" id="addVenueBtn">+ Добавить место</button>
  <div id="summaryContainer"></div>
</div>

<script>
const COLORS = ['#5b8dee','#e85d75','#36b37e','#ff8c42','#8e44ad','#16a085','#d35400','#e74c3c'];
const EMOJIS = ['🍺','🍽','🍕','☕','🍻','🥘','🎲','🍾'];

let state = {
  numPeople: 2,
  people: ['Человек 1', 'Человек 2'],
  venues: [{ id:'v1', name:'', mode:'equal', dishes:[], payerMode:'single', singlePayer:0, multiPayers:{} }]
};
let emojiMap = { v1: '🍺' };

function uid() { return 'x'+Math.random().toString(36).slice(2,8); }
function pName(i) { return state.people[i] || `Чел. ${i+1}`; }

function mkAv(i, size=22) {
  const s = document.createElement('span');
  s.style.cssText = `width:${size}px;height:${size}px;border-radius:50%;background:${COLORS[i%COLORS.length]};display:inline-flex;align-items:center;justify-content:center;font-size:${Math.floor(size*.45)}px;font-weight:700;color:#fff;font-family:'Unbounded',sans-serif;flex-shrink:0`;
  s.textContent = i+1;
  return s;
}

/* ---- People ---- */
function renderPeople() {
  document.getElementById('countNum').textContent = state.numPeople;
  const g = document.getElementById('peopleGrid');
  g.innerHTML = '';
  for (let i=0;i<state.numPeople;i++) {
    const w = document.createElement('div'); w.className='person-input-wrap';
    w.appendChild(mkAv(i));
    const inp = document.createElement('input'); inp.className='person-name-input';
    inp.placeholder='Имя'; inp.value=state.people[i]||'';
    inp.oninput=e=>{ state.people[i]=e.target.value; renderSummary(); };
    w.appendChild(inp); g.appendChild(w);
  }
}

/* ---- Venues ---- */
function renderVenues() {
  const c = document.getElementById('venuesContainer');
  c.innerHTML='';
  state.venues.forEach(v=>c.appendChild(buildVenue(v)));
}

function vTotal(venue) { return venue.dishes.reduce((s,d)=>s+(parseFloat(d.price)||0),0); }
function updateVenueTotal(venue) { const el=document.getElementById('vtotal-'+venue.id); if(el) el.textContent=Math.round(vTotal(venue))+' ₽'; }
function paidTotal(venue) {
  if (venue.payerMode==='single') return vTotal(venue);
  return Object.values(venue.multiPayers).reduce((s,v)=>s+(parseFloat(v)||0),0);
}

function buildVenue(venue) {
  const wrap = document.createElement('div'); wrap.className='venue-card';

  // Header
  const hdr = document.createElement('div'); hdr.className='venue-header';
  const em = document.createElement('span'); em.style.fontSize='17px'; em.textContent=emojiMap[venue.id]||'🍽';
  const ni = document.createElement('input'); ni.className='venue-name-input';
  ni.placeholder='Название (Бар 1, Ресторан...)'; ni.value=venue.name;
  ni.oninput=e=>{ venue.name=e.target.value; renderSummary(); };
  hdr.appendChild(em); hdr.appendChild(ni);
  if (state.venues.length>1) {
    const db=document.createElement('button'); db.className='venue-delete-btn'; db.textContent='Удалить';
    db.onclick=()=>{ state.venues=state.venues.filter(v=>v.id!==venue.id); renderVenues(); renderSummary(); };
    hdr.appendChild(db);
  }
  wrap.appendChild(hdr);

  // Body
  const body=document.createElement('div'); body.className='venue-body';

  // Split mode
  const tog=document.createElement('div'); tog.className='mode-toggle';
  ['equal','manual'].forEach(m=>{
    const b=document.createElement('button'); b.className='mode-btn'+(venue.mode===m?' active':'');
    b.textContent=m==='equal'?'⚖ Поровну':'👤 По людям';
    b.onclick=()=>{ venue.mode=m; renderVenues(); renderSummary(); };
    tog.appendChild(b);
  });
  body.appendChild(tog);

  // Dishes
  const dw=document.createElement('div');
  if (!venue.dishes.length) { const h=document.createElement('p'); h.className='empty-hint'; h.textContent='Добавьте блюда ниже'; dw.appendChild(h); }
  else venue.dishes.forEach(d=>dw.appendChild(buildDish(d,venue)));
  body.appendChild(dw);

  // Venue subtotal
  const tr=document.createElement('div'); tr.className='venue-total-row';
  const tl=document.createElement('span'); tl.textContent='Итого по месту:';
  const ta=document.createElement('span'); ta.style.cssText='font-weight:600;color:var(--text);font-size:13px';
  ta.id='vtotal-'+venue.id;
  ta.textContent=Math.round(vTotal(venue))+' ₽';
  tr.appendChild(tl); tr.appendChild(ta); body.appendChild(tr);

  const ab=document.createElement('button'); ab.className='add-dish-btn'; ab.textContent='+ Добавить блюдо';
  ab.onclick=()=>{ venue.dishes.push({id:uid(),name:'',price:'',assignedTo:[]}); renderVenues(); renderSummary(); };
  body.appendChild(ab);

  // Payer section
  body.appendChild(buildPayer(venue));
  wrap.appendChild(body);
  return wrap;
}

function buildDish(dish, venue) {
  const row=document.createElement('div'); row.className='dish-row';
  const main=document.createElement('div'); main.className='dish-main-row';
  const ni=document.createElement('input'); ni.className='dish-name-input'; ni.placeholder='Название блюда'; ni.value=dish.name;
  ni.oninput=e=>{ dish.name=e.target.value; renderSummary(); };
  const pw=document.createElement('div'); pw.className='dish-price-wrap';
  const pi=document.createElement('input'); pi.className='dish-price-input'; pi.type='number'; pi.min='0'; pi.placeholder='0'; pi.value=dish.price;
  pi.oninput=e=>{ dish.price=e.target.value; updateVenueTotal(venue); renderSummary(); };
  const cu=document.createElement('span'); cu.className='currency'; cu.textContent='₽';
  pw.appendChild(pi); pw.appendChild(cu);
  const del=document.createElement('button'); del.className='dish-del-btn'; del.textContent='✕';
  del.onclick=()=>{ venue.dishes=venue.dishes.filter(d=>d.id!==dish.id); renderVenues(); renderSummary(); };
  main.appendChild(ni); main.appendChild(pw); main.appendChild(del); row.appendChild(main);
  if (venue.mode==='manual') {
    const cr=document.createElement('div'); cr.className='chips-row';
    for (let i=0;i<state.numPeople;i++) {
      const on=dish.assignedTo&&dish.assignedTo.includes(i);
      const chip=document.createElement('span'); chip.className='chip'+(on?' on':'');
      const ca=document.createElement('span'); ca.className='chip-av'; ca.style.background=COLORS[i%COLORS.length]; ca.textContent=i+1;
      chip.appendChild(ca); chip.appendChild(document.createTextNode(pName(i)));
      chip.onclick=()=>{
        if(!dish.assignedTo)dish.assignedTo=[];
        const idx=dish.assignedTo.indexOf(i);
        if(idx>=0)dish.assignedTo.splice(idx,1); else dish.assignedTo.push(i);
        renderVenues(); renderSummary();
      };
      cr.appendChild(chip);
    }
    row.appendChild(cr);
  }
  return row;
}

function buildPayer(venue) {
  const sec=document.createElement('div'); sec.className='payer-section';
  const lbl=document.createElement('div'); lbl.className='payer-label'; lbl.textContent='💳 Кто платил?';
  sec.appendChild(lbl);

  const pmTog=document.createElement('div'); pmTog.className='payer-mode-toggle';
  [{k:'single',t:'Один платил'},{k:'multi',t:'Несколько платили'}].forEach(({k,t})=>{
    const b=document.createElement('button'); b.className='payer-mode-btn'+(venue.payerMode===k?' active':'');
    b.textContent=t;
    b.onclick=()=>{ venue.payerMode=k; renderVenues(); renderSummary(); };
    pmTog.appendChild(b);
  });
  sec.appendChild(pmTog);

  const tot=vTotal(venue);

  if (venue.payerMode==='single') {
    const row=document.createElement('div'); row.className='payer-single-row';
    for (let i=0;i<state.numPeople;i++) {
      const isOn=venue.singlePayer===i;
      const chip=document.createElement('span'); chip.className='chip'+(isOn?' on':'');
      const ca=document.createElement('span'); ca.className='chip-av'; ca.style.background=COLORS[i%COLORS.length]; ca.textContent=i+1;
      chip.appendChild(ca); chip.appendChild(document.createTextNode(pName(i)));
      chip.onclick=()=>{ venue.singlePayer=i; renderVenues(); renderSummary(); };
      row.appendChild(chip);
    }
    sec.appendChild(row);
    if (tot>0) {
      const badge=document.createElement('div'); badge.className='badge badge-green';
      badge.textContent=`${pName(venue.singlePayer)} заплатил ${Math.round(tot)} ₽`;
      sec.appendChild(badge);
    }
  } else {
    const grid=document.createElement('div'); grid.className='payer-multi-grid';
    for (let i=0;i<state.numPeople;i++) {
      const pr=document.createElement('div'); pr.className='payer-person-row';
      const pn=document.createElement('div'); pn.className='payer-person-name';
      pn.appendChild(mkAv(i,20)); pn.appendChild(document.createTextNode(pName(i)));
      const aw=document.createElement('div'); aw.className='payer-amount-wrap';
      const ai=document.createElement('input'); ai.className='payer-amount-input';
      ai.type='number'; ai.min='0'; ai.placeholder='0';
      ai.value=venue.multiPayers[i]!==undefined?venue.multiPayers[i]:'';
      ai.oninput=e=>{ venue.multiPayers[i]=e.target.value; renderSummary(); };
      const cu=document.createElement('span'); cu.className='currency'; cu.textContent='₽';
      aw.appendChild(ai); aw.appendChild(cu);
      pr.appendChild(pn); pr.appendChild(aw); grid.appendChild(pr);
    }
    sec.appendChild(grid);
    if (tot>0) {
      const paid=paidTotal(venue);
      const diff=paid-tot;
      const badge=document.createElement('div');
      if (Math.abs(diff)<0.5) { badge.className='badge badge-green'; badge.textContent=`✓ Оплачено ${Math.round(paid)} ₽`; }
      else if (diff<0) { badge.className='badge badge-warn'; badge.textContent=`Не хватает ${Math.round(-diff)} ₽`; }
      else { badge.className='badge badge-warn'; badge.textContent=`Переплата ${Math.round(diff)} ₽`; }
      sec.appendChild(badge);
    }
  }
  return sec;
}

/* ---- Calc ---- */
function calcAll() {
  const consumed=new Array(state.numPeople).fill(0);
  const paid=new Array(state.numPeople).fill(0);
  let grandTotal=0;
  const detail=[];

  state.venues.forEach(venue=>{
    const tot=vTotal(venue);
    grandTotal+=tot;

    // Paid
    if (venue.payerMode==='single') {
      paid[venue.singlePayer]+=tot;
    } else {
      for (let i=0;i<state.numPeople;i++) paid[i]+=(parseFloat(venue.multiPayers[i])||0);
    }

    // Consumed
    const vd={name:venue.name,rows:[]};
    venue.dishes.forEach(dish=>{
      const price=parseFloat(dish.price)||0; if (!price) return;
      if (venue.mode==='equal') {
        const share=price/state.numPeople;
        for(let i=0;i<state.numPeople;i++) consumed[i]+=share;
        vd.rows.push({label:dish.name||'Блюдо',shares:new Array(state.numPeople).fill(share)});
      } else {
        const asgn=(dish.assignedTo||[]).slice(); if(!asgn.length) return;
        const share=price/asgn.length;
        asgn.forEach(i=>consumed[i]+=share);
        const shares=new Array(state.numPeople).fill(0);
        asgn.forEach(i=>shares[i]=share);
        vd.rows.push({label:dish.name||'Блюдо',shares});
      }
    });
    if (vd.rows.length) detail.push(vd);
  });

  // Balance & settle
  const balance=paid.map((p,i)=>p-consumed[i]);
  const settlements=[];
  const debtors=balance.map((b,i)=>({i,b})).filter(x=>x.b<-0.5).sort((a,b)=>a.b-b.b).map(x=>({...x}));
  const creditors=balance.map((b,i)=>({i,b})).filter(x=>x.b>0.5).sort((a,b)=>b.b-a.b).map(x=>({...x}));
  let di=0,ci=0;
  while(di<debtors.length&&ci<creditors.length){
    const amt=Math.min(-debtors[di].b,creditors[ci].b);
    if(amt>0.5) settlements.push({from:debtors[di].i,to:creditors[ci].i,amount:amt});
    debtors[di].b+=amt; creditors[ci].b-=amt;
    if(Math.abs(debtors[di].b)<0.5)di++;
    if(Math.abs(creditors[ci].b)<0.5)ci++;
  }
  return {consumed,paid,balance,settlements,grandTotal,detail};
}

/* ---- Summary ---- */
function renderSummary() {
  const cont=document.getElementById('summaryContainer');
  cont.innerHTML='';
  const {consumed,paid,balance,settlements,grandTotal}=calcAll();
  if (!grandTotal) return;

  // Main summary card
  const card=document.createElement('div'); card.className='summary-card';
  const t=document.createElement('div'); t.className='summary-section-title'; t.textContent='Итог по участникам';
  card.appendChild(t);
  const grid=document.createElement('div'); grid.className='people-totals';
  for(let i=0;i<state.numPeople;i++){
    const pc=document.createElement('div'); pc.className='person-total-card';
    const pn=document.createElement('div'); pn.className='person-total-name';
    pn.appendChild(mkAv(i,16)); pn.appendChild(document.createTextNode(pName(i)));
    const amt=document.createElement('div'); amt.className='person-total-consumed';
    amt.textContent=Math.round(consumed[i])+'₽';
    const paidEl=document.createElement('div'); paidEl.className='person-total-paid';
    paidEl.textContent=`заплатил ${Math.round(paid[i])} ₽`;
    pc.appendChild(pn); pc.appendChild(amt); pc.appendChild(paidEl); grid.appendChild(pc);
  }
  card.appendChild(grid);
  const gt=document.createElement('div'); gt.className='grand-total-row';
  const gl=document.createElement('span'); gl.className='grand-total-label'; gl.textContent='Общий счёт';
  const ga=document.createElement('span'); ga.className='grand-total-amount'; ga.textContent=Math.round(grandTotal)+' ₽';
  gt.appendChild(gl); gt.appendChild(ga); card.appendChild(gt);
  cont.appendChild(card);

  // Settlements
  if (settlements.length>0) {
    const sc=document.createElement('div'); sc.className='settlements-card';
    const sh=document.createElement('div'); sh.className='settlements-header'; sh.textContent='💸 Кто кому должен';
    sc.appendChild(sh);
    settlements.forEach(s=>{
      const row=document.createElement('div'); row.className='settlement-row';
      const from=document.createElement('span'); from.className='settle-from';
      from.appendChild(mkAv(s.from,24)); from.appendChild(document.createTextNode(pName(s.from)));
      const arrow=document.createElement('span'); arrow.className='settle-arrow'; arrow.textContent='→';
      const to=document.createElement('span'); to.className='settle-to';
      to.appendChild(mkAv(s.to,24)); to.appendChild(document.createTextNode(pName(s.to)));
      const amt=document.createElement('span'); amt.className='settle-amount'; amt.textContent=Math.round(s.amount)+' ₽';
      row.appendChild(from); row.appendChild(arrow); row.appendChild(to); row.appendChild(amt);
      sc.appendChild(row);
    });
    cont.appendChild(sc);
  } else {
    const ok=document.createElement('div'); ok.className='ok-banner'; ok.textContent='✓ Все в расчёте — никто никому не должен!';
    cont.appendChild(ok);
  }
}

document.getElementById('decBtn').onclick=()=>{
  if(state.numPeople<=2)return;
  state.numPeople--;
  state.people=state.people.slice(0,state.numPeople);
  renderPeople(); renderVenues(); renderSummary();
};
document.getElementById('incBtn').onclick=()=>{
  if(state.numPeople>=8)return;
  state.numPeople++;
  if(!state.people[state.numPeople-1])state.people[state.numPeople-1]=`Человек ${state.numPeople}`;
  renderPeople(); renderVenues(); renderSummary();
};
document.getElementById('addVenueBtn').onclick=()=>{
  const id=uid();
  emojiMap[id]=EMOJIS[state.venues.length%EMOJIS.length];
  state.venues.push({id,name:'',mode:'equal',dishes:[],payerMode:'single',singlePayer:0,multiPayers:{}});
  renderVenues(); renderSummary();
};

renderPeople(); renderVenues(); renderSummary();
</script>
